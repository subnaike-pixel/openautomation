name: Build OpenAutomation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Windows
        run: npm run build
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenAutomation-Windows
          path: dist-build/OpenAutomation.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Mac
        run: npx electron-builder build --mac --publish never
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenAutomation-Mac
          path: dist-build/*.dmg
